name: 🔌 Plugin | Package and release

# TODO: read up on this
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  release:
    types: [published]
  workflow_dispatch:

jobs:
  plugin-package:
    name: Packages and releases plugin
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      
#      # Install dependencies for translations. Only necessary if transifex is used.
#      - name: Install Qt lrelease
#        run: |
#          sudo apt-get update
#          sudo apt-get install qtbase5-dev qttools5-dev-tools

      - name: Install qgis-plugin-ci
        run: pip install qgis-plugin-ci>=2.8.6
      
#      # This allows updating new translations to the online translation platform transifex
#      - name: 🌍 Push translations
#        if: ${{ github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/') }}
#        run: qgis-plugin-ci push-translation ${{ secrets.TX_TOKEN }}

      # Package the plugin as a dev version for preview
      - name: Package dev version
        if: ${{ ! startsWith(github.ref, 'refs/tags/') }}
        run: |
          VERSION=0.0.0
          qgis-plugin-ci -v package ${VERSION} \
            --allow-uncommitted-changes \
#            --transifex-token "${{ secrets.TX_TOKEN }}"
      
      - name: Upload dev version artifact
        id: upload-artifact
        uses: actions/upload-artifact@v7
        if: ${{ ! startsWith(github.ref, 'refs/tags/') }}
        with:
          archive: false
          path: test_plugin.0.0.0.zip
          if-no-files-found: error

      - name: Comment on PR with artifact link
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: plugin-artifact
          message: |
            ## 🔌 Plugin Artifact

            A development build of the plugin is available for testing:

            **[⬇️ Download nw_ow_locator_dev.zip](${{ steps.upload-artifact.outputs.artifact-url }})**

            > ⚠️ This is a development build from commit ${{ github.event.pull_request.head.sha }}.

#      # Release the plugin to the QGIS plugin repository.
#      # This step is triggered when a release is created in GitHub.
#      # Remember to set the `--github-token` and `--qgis_token` as environment variables in GitHub
#      - name: Release
#        if: startsWith(github.ref, 'refs/tags/')
#        run: |
#          VERSION=${{ github.ref_name }}
#          qgis-plugin-ci release ${VERSION} \
#            --allow-uncommitted-changes \
#            --github-token ${{ secrets.GITHUB_TOKEN }} \
#            --qgis-token ${{ secrets.QGIS_ORG_TOKEN }} \
##            --transifex-token "${{ secrets.TX_TOKEN }}"

      # Package the plugin to add it to the GitHub release
      - name: Package release version
        if: ${{ github.event_name == 'release' }}
        run: |
          VERSION=${{ github.event.release.tag_name }}
          qgis-plugin-ci -v package ${VERSION} \
            --allow-uncommitted-changes \
#            --transifex-token "${{ secrets.TX_TOKEN }}"

      # Add the plugin package to the release page for easy download
      - name: Upload release asset
        if: ${{ github.event_name == 'release' }}
        uses: softprops/action-gh-release@v2
        with:
          files: test_plugin.${{ github.event.release.tag_name }}.zip
